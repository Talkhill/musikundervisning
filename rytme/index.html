<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BEAT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff3366;
    --accent3: #ffcc00;
    --text: #e0e0f0;
    --dim: #444466;
    --cell-off: #1a1a28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  header {
    width: 100%;
    padding: 14px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,136,0.5);
  }

  .bpm-block { display: flex; align-items: center; gap: 8px; }
  .bpm-label { font-size: 0.6rem; color: var(--dim); letter-spacing: 2px; }
  .bpm-val { font-size: 1.3rem; color: var(--accent3); min-width: 3ch; text-align: center; }

  .bpm-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    width: 26px; height: 26px;
    border-radius: 4px;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .bpm-btn:active { background: var(--border); }

  .main {
    width: 100%;
    max-width: 520px;
    padding: 10px 10px;
    flex: 1;
  }

  .bars-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .bar-tab {
    flex: 1; padding: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; letter-spacing: 2px;
    text-align: center; cursor: pointer; border-radius: 4px;
    transition: all 0.15s;
  }
  .bar-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.06); }

  .tracks { display: flex; flex-direction: column; gap: 5px; }

  .track { display: flex; align-items: center; gap: 6px; }

  .track-label {
    width: 40px;
    font-size: 0.55rem;
    letter-spacing: 1px;
    color: var(--dim);
    text-align: right;
    flex-shrink: 0;
    line-height: 1.2;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    padding: 4px 0;
    transition: color 0.15s;
    position: relative;
  }
  .track-label span { display: block; font-size: 0.72rem; color: var(--text); transition: color 0.15s; }
  .track-label:active { opacity: 0.7; }
  .track-label.has-sample span { color: var(--accent3); }
  .track-label.has-sample::after {
    content: '●';
    font-size: 0.35rem;
    color: var(--accent3);
    position: absolute;
    top: 2px; right: -1px;
  }

  .cells {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 3px;
    flex: 1;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 3px;
    background: var(--cell-off);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.08s, transform 0.05s;
    touch-action: manipulation;
  }
  .cell:active { transform: scale(0.9); }
  .cell.on { border-color: transparent; }
  .cell:nth-child(4n+1) { margin-left: 3px; }
  .cell:first-child { margin-left: 0; }

  .track[data-t="0"] .cell.on { background: var(--accent);  box-shadow: 0 0 8px rgba(0,255,136,0.6); }
  .track[data-t="1"] .cell.on { background: var(--accent2); box-shadow: 0 0 8px rgba(255,51,102,0.6); }
  .track[data-t="2"] .cell.on { background: var(--accent3); box-shadow: 0 0 8px rgba(255,204,0,0.6); }
  .track[data-t="3"] .cell.on { background: #44aaff; box-shadow: 0 0 8px rgba(68,170,255,0.6); }
  .track[data-t="4"] .cell.on { background: #cc66ff; box-shadow: 0 0 8px rgba(204,102,255,0.6); }
  .track[data-t="5"] .cell.on { background: #ff8833; box-shadow: 0 0 8px rgba(255,136,51,0.6); }

  .cell.playing { filter: brightness(2.5); transform: scale(1.05); }

  .divider { width: 100%; height: 1px; background: var(--border); margin: 6px 0; }

  .controls {
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 10px; margin-top: 14px; padding: 12px;
    background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px;
  }

  .play-btn {
    width: 58px; height: 58px; border-radius: 50%;
    border: 2px solid var(--accent);
    background: rgba(0,255,136,0.08);
    color: var(--accent); font-size: 1.5rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .play-btn.playing {
    background: var(--accent); color: var(--bg);
    box-shadow: 0 0 24px rgba(0,255,136,0.5);
  }
  .play-btn:active { transform: scale(0.94); }

  .ctrl-right { display: flex; flex-direction: column; gap: 7px; flex: 1; }
  .bars-toggle { display: flex; gap: 6px; }

  .bar-count-btn {
    flex: 1; padding: 7px 4px;
    background: var(--cell-off); border: 1px solid var(--border);
    color: var(--dim); font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; letter-spacing: 1px; cursor: pointer;
    border-radius: 4px; text-align: center; transition: all 0.15s;
  }
  .bar-count-btn.active { border-color: var(--accent3); color: var(--accent3); background: rgba(255,204,0,0.07); }

  .clear-btn {
    flex: 1; padding: 7px;
    background: var(--cell-off); border: 1px solid var(--border);
    color: var(--accent2); font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; letter-spacing: 1px; cursor: pointer;
    border-radius: 4px; text-align: center; transition: all 0.15s;
  }
  .clear-btn:active { background: rgba(255,51,102,0.1); }

  .shuffle-btn {
    width: 100%; padding: 10px;
    background: linear-gradient(135deg, rgba(0,255,136,0.08), rgba(68,170,255,0.08));
    border: 1px solid var(--accent); color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem; letter-spacing: 2px;
    cursor: pointer; border-radius: 4px; text-align: center;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .shuffle-btn:active { background: rgba(0,255,136,0.15); transform: scale(0.98); }

  .genre-tag {
    text-align: center; font-size: 0.6rem; letter-spacing: 3px;
    color: var(--accent3); margin-top: 4px; min-height: 1.2em; transition: opacity 0.3s;
  }

  .step-counter {
    text-align: center; font-size: 0.62rem; color: var(--dim);
    letter-spacing: 2px; margin-top: 7px;
  }
  .step-counter span { color: var(--accent); }

  .track-vol { width: 10px; flex-shrink: 0; display: flex; align-items: center; }
  .vol-bar { width: 3px; height: 22px; background: var(--border); border-radius: 2px; overflow: hidden; position: relative; }
  .vol-fill { position: absolute; bottom: 0; width: 100%; background: var(--dim); }

  /* ── RECORD OVERLAY ───────────────────────────────────────── */
  .rec-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(5,5,12,0.93); z-index: 200;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 28px;
    backdrop-filter: blur(4px);
  }
  .rec-overlay.active { display: flex; }

  .rec-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 5px; color: var(--accent2);
  }
  .rec-subtitle { font-size: 0.62rem; letter-spacing: 3px; color: var(--dim); }

  .rec-waveform {
    width: 100%; max-width: 340px; height: 72px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .rec-waveform canvas { width: 100%; height: 100%; display: block; }

  .rec-timer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem; letter-spacing: 4px; color: var(--text);
    min-width: 6ch; text-align: center;
  }
  .rec-timer.recording { color: var(--accent2); }

  .rec-status { font-size: 0.6rem; letter-spacing: 2px; color: var(--dim); min-height: 1em; }
  .rec-status.live { color: var(--accent2); }

  .rec-row { display: flex; gap: 10px; width: 100%; max-width: 340px; }

  .rec-btn {
    flex: 1; padding: 13px 6px; border-radius: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem; letter-spacing: 2px;
    cursor: pointer; transition: all 0.15s; border: 1px solid;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .rec-btn:active { transform: scale(0.96); }
  .rec-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-rec   { background: rgba(255,51,102,0.1); border-color: var(--accent2); color: var(--accent2); }
  .btn-rec.active { background: var(--accent2); color: #000; box-shadow: 0 0 20px rgba(255,51,102,0.5); animation: rpulse 0.5s infinite alternate; }
  .btn-play  { background: rgba(0,255,136,0.08); border-color: var(--accent);  color: var(--accent); }
  .btn-save  { background: rgba(255,204,0,0.08); border-color: var(--accent3); color: var(--accent3); }
  .btn-cancel { background: transparent; border-color: var(--dim); color: var(--dim); flex: 0.55; }

  @keyframes rpulse { from { opacity:1; } to { opacity:0.5; } }

  .rec-hint {
    font-size: 0.56rem; color: var(--dim); letter-spacing: 1px;
    text-align: center; line-height: 1.7; max-width: 300px;
  }
  .rec-hint b { color: var(--accent3); font-weight: normal; }

  /* sample indicator on vol bar */
  .track-vol.has-sample .vol-fill { background: var(--accent3); }
</style>
</head>
<body>

<header>
  <div class="logo">BEAT</div>
  <div class="bpm-block">
    <div>
      <div class="bpm-label">BPM</div>
      <div class="bpm-val" id="bpmVal">120</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:3px;">
      <button class="bpm-btn" id="bpmUp">+</button>
      <button class="bpm-btn" id="bpmDn">−</button>
    </div>
  </div>
</header>

<div class="main">
  <div class="bars-tabs" id="barsTabs"></div>
  <div class="tracks" id="tracks"></div>

  <div class="controls">
    <button class="play-btn" id="playBtn">▶</button>
    <div class="ctrl-right">
      <div class="bars-toggle">
        <button class="bar-count-btn active" id="bc1" onclick="setBarCount(1)">1 TAKT</button>
        <button class="bar-count-btn" id="bc2" onclick="setBarCount(2)">2 TAKTER</button>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="clear-btn" onclick="clearBar()">RYD TAKT</button>
        <button class="clear-btn" style="color:var(--dim);" onclick="clearAll()">RYD ALT</button>
      </div>
    </div>
  </div>

  <button class="shuffle-btn" style="margin-top:10px;" onclick="loadRandomPattern()">&#x21BB; &nbsp;NY RYTME</button>
  <div class="genre-tag" id="genreTag"></div>
  <div class="step-counter">STEP <span id="stepDisp">01</span> / <span id="totalDisp">16</span></div>
</div>

<!-- RECORD OVERLAY -->
<div class="rec-overlay" id="recOverlay">
  <div class="rec-title">OPTAG SAMPLE</div>
  <div class="rec-subtitle" id="recTrackName">TRACK</div>

  <div class="rec-waveform"><canvas id="recCanvas"></canvas></div>
  <div class="rec-timer" id="recTimer">0:00</div>
  <div class="rec-status" id="recStatus">TRYK ● FOR AT STARTE</div>

  <div class="rec-row">
    <button class="rec-btn btn-rec" id="btnRec">● OPTAG</button>
    <button class="rec-btn btn-play" id="btnPlay" disabled>▶ AFSPIL</button>
    <button class="rec-btn btn-save" id="btnSave" disabled>✓ GEM</button>
    <button class="rec-btn btn-cancel" id="btnCancel">✕</button>
  </div>

  <div class="rec-hint">
    <b>Tryk på et sporsnavn</b> for at optage et sample.<br>
    Maks 3 sekunder · Erstatter det syntetiske instrument.
  </div>
</div>

<script>
// ─── TRACKS ───────────────────────────────────────────────────────────────────
const TRACKS = [
  { name: "KICK",  short: "BD" },
  { name: "SNARE", short: "SD" },
  { name: "HH CL", short: "HH" },
  { name: "HH OP", short: "OH" },
  { name: "CLAP",  short: "CP" },
  { name: "PERC",  short: "PC" },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
const STEPS = 16;
let barCount = 1, currentBar = 0, bpm = 120;
let playing = false, currentStep = 0;
let schedulerTimer = null, nextNoteTime = 0;
let audioCtx = null;

let grid = [
  Array.from({length:6}, ()=>new Array(16).fill(false)),
  Array.from({length:6}, ()=>new Array(16).fill(false)),
];

// Custom samples: [trackIdx] = AudioBuffer | null
let customSamples = new Array(6).fill(null);

// Default pattern
grid[0][0][0]=grid[0][0][4]=grid[0][0][8]=grid[0][0][12]=true;
grid[0][1][4]=grid[0][1][12]=true;
for(let i=0;i<16;i+=2) grid[0][2][i]=true;

// ─── AUDIO CTX ────────────────────────────────────────────────────────────────
function getCtx() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

// ─── SYNTH SOUNDS ─────────────────────────────────────────────────────────────
function playSynth(type, time) {
  const ctx = getCtx();
  const g = ctx.createGain();
  g.connect(ctx.destination);

  if(type===0) {
    const o=ctx.createOscillator(); o.connect(g);
    o.frequency.setValueAtTime(150,time); o.frequency.exponentialRampToValueAtTime(40,time+0.15);
    g.gain.setValueAtTime(1,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.3);
    o.start(time); o.stop(time+0.3);
  } else if(type===1) {
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=1500;
    src.connect(f); f.connect(g);
    g.gain.setValueAtTime(0.7,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.15);
    src.start(time);
  } else if(type===2) {
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=8000;
    src.connect(f); f.connect(g);
    g.gain.setValueAtTime(0.5,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.05);
    src.start(time);
  } else if(type===3) {
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.25,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.5);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=6000;
    src.connect(f); f.connect(g);
    g.gain.setValueAtTime(0.4,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.25);
    src.start(time);
  } else if(type===4) {
    for(let c=0;c<3;c++) {
      const delay=c*0.012;
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.08,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
      const src=ctx.createBufferSource(); src.buffer=buf;
      const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1200; f.Q.value=0.5;
      src.connect(f); f.connect(g);
      g.gain.setValueAtTime(0.6,time+delay);
      src.start(time+delay);
    }
  } else if(type===5) {
    const o=ctx.createOscillator(); o.type='triangle'; o.connect(g);
    o.frequency.setValueAtTime(400,time); o.frequency.exponentialRampToValueAtTime(200,time+0.08);
    g.gain.setValueAtTime(0.6,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.12);
    o.start(time); o.stop(time+0.12);
  }
}

function playSound(type, time) {
  if(customSamples[type]) {
    const ctx = getCtx();
    const src = ctx.createBufferSource();
    src.buffer = customSamples[type];
    const g = ctx.createGain();
    g.gain.setValueAtTime(1, time);
    src.connect(g); g.connect(ctx.destination);
    src.start(time);
  } else {
    playSynth(type, time);
  }
}

// ─── SCHEDULER ────────────────────────────────────────────────────────────────
function scheduler() {
  const ctx = getCtx();
  const spb = 60/bpm, sps = spb/4;
  while(nextNoteTime < ctx.currentTime+0.1) {
    const total = barCount*STEPS;
    const bar = Math.floor(currentStep/STEPS);
    const step = currentStep%STEPS;
    for(let t=0;t<6;t++) if(grid[bar][t][step]) playSound(t, nextNoteTime);
    const snap=currentStep, delay=(nextNoteTime-ctx.currentTime)*1000;
    setTimeout(()=>updatePlayhead(snap), Math.max(0,delay-5));
    nextNoteTime+=sps;
    currentStep=(currentStep+1)%total;
  }
  schedulerTimer=setTimeout(scheduler,25);
}

function updatePlayhead(step) {
  const bar=Math.floor(step/STEPS), s=step%STEPS;
  if(bar!==currentBar){ currentBar=bar; buildUI(); }
  document.querySelectorAll('.cell.playing').forEach(c=>c.classList.remove('playing'));
  document.querySelectorAll(`.track .cells .cell[data-bar="${bar}"][data-step="${s}"]`).forEach(c=>c.classList.add('playing'));
  document.getElementById('stepDisp').textContent=String(step+1).padStart(2,'0');
}

function startStop() {
  const btn=document.getElementById('playBtn');
  playing=!playing;
  if(playing) {
    const ctx=getCtx(); if(ctx.state==='suspended') ctx.resume();
    currentStep=0; nextNoteTime=ctx.currentTime+0.05;
    scheduler(); btn.textContent='⏹'; btn.classList.add('playing');
  } else {
    clearTimeout(schedulerTimer); btn.textContent='▶'; btn.classList.remove('playing');
    document.querySelectorAll('.cell.playing').forEach(c=>c.classList.remove('playing'));
    document.getElementById('stepDisp').textContent='01';
  }
}

// ─── UI BUILD ─────────────────────────────────────────────────────────────────
function buildUI() {
  const tabsEl=document.getElementById('barsTabs');
  tabsEl.innerHTML='';
  for(let b=0;b<barCount;b++){
    const t=document.createElement('div');
    t.className='bar-tab'+(b===currentBar?' active':'');
    t.textContent='TAKT '+(b+1);
    t.onclick=()=>{currentBar=b;buildUI();};
    tabsEl.appendChild(t);
  }

  const tracksEl=document.getElementById('tracks');
  tracksEl.innerHTML='';
  TRACKS.forEach((tr,ti)=>{
    const row=document.createElement('div');
    row.className='track'; row.dataset.t=ti;

    const lbl=document.createElement('div');
    lbl.className='track-label'+(customSamples[ti]?' has-sample':'');
    lbl.innerHTML=`<span>${tr.short}</span>${tr.name}`;
    lbl.title='Hold for at optage sample';

    // Long-press or tap to open recorder
    let pressTimer=null;
    lbl.addEventListener('pointerdown', e=>{
      pressTimer=setTimeout(()=>{ pressTimer=null; openRecorder(ti); },400);
    });
    lbl.addEventListener('pointerup', ()=>{ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; openRecorder(ti); }});
    lbl.addEventListener('pointercancel', ()=>{ clearTimeout(pressTimer); pressTimer=null; });
    row.appendChild(lbl);

    const cells=document.createElement('div');
    cells.className='cells';
    for(let s=0;s<STEPS;s++){
      const cell=document.createElement('div');
      cell.className='cell'+(grid[currentBar][ti][s]?' on':'');
      cell.dataset.bar=currentBar; cell.dataset.step=s; cell.dataset.track=ti;
      cell.addEventListener('pointerdown',e=>{
        e.preventDefault();
        grid[currentBar][ti][s]=!grid[currentBar][ti][s];
        cell.classList.toggle('on',grid[currentBar][ti][s]);
        if(navigator.vibrate) navigator.vibrate(10);
      });
      cells.appendChild(cell);
    }
    row.appendChild(cells);

    const vol=document.createElement('div');
    vol.className='track-vol'+(customSamples[ti]?' has-sample':'');
    vol.innerHTML=`<div class="vol-bar"><div class="vol-fill" style="height:${60+ti*5}%"></div></div>`;
    row.appendChild(vol);
    tracksEl.appendChild(row);
    if(ti===3){ const d=document.createElement('div'); d.className='divider'; tracksEl.appendChild(d); }
  });

  document.getElementById('totalDisp').textContent=String(barCount*STEPS).padStart(2,'0');
}

function setBarCount(n){
  barCount=n; currentBar=0;
  document.getElementById('bc1').classList.toggle('active',n===1);
  document.getElementById('bc2').classList.toggle('active',n===2);
  if(playing) startStop();
  buildUI();
}

function clearBar(){
  grid[currentBar]=Array.from({length:6},()=>new Array(16).fill(false));
  buildUI();
}
function clearAll(){
  grid=[Array.from({length:6},()=>new Array(16).fill(false)),Array.from({length:6},()=>new Array(16).fill(false))];

// ─── RECORDER ─────────────────────────────────────────────────────────────────
let recTrackIdx = -1;
let mediaStream = null;
let mediaRecorder = null;
let recChunks = [];
let recBlob = null;
let recAudioBuffer = null;
let analyserNode = null;
let animFrame = null;

let recTimerInterval = null;

const MAX_REC_SECS = 3;

function openRecorder(trackIdx) {
  recTrackIdx = trackIdx;
  recBlob = null; recAudioBuffer = null; recChunks = [];
  isRecording = false;

  document.getElementById('recTrackName').textContent = TRACKS[trackIdx].short + ' · ' + TRACKS[trackIdx].name;
  document.getElementById('recTimer').textContent = '0:00';
  document.getElementById('recTimer').classList.remove('recording');
  document.getElementById('recStatus').textContent = customSamples[trackIdx] ? 'HAR SAMPLE — OPTAG NY ELLER GEM' : 'TRYK ● FOR AT STARTE';
  document.getElementById('recStatus').classList.remove('live');
  document.getElementById('btnRec').classList.remove('active');
  document.getElementById('btnRec').textContent = '● OPTAG';
  document.getElementById('btnPlay').disabled = !customSamples[trackIdx];
  document.getElementById('btnSave').disabled = true;

  // If we already have a sample for this track, load it for preview
  recAudioBuffer = customSamples[trackIdx] || null;

  clearCanvas();
  document.getElementById('recOverlay').classList.add('active');
  if(navigator.vibrate) navigator.vibrate(15);
}

function closeRecorder() {
  stopRecording(false);
  document.getElementById('recOverlay').classList.remove('active');
  if(animFrame) cancelAnimationFrame(animFrame); animFrame=null;
}

function clearCanvas() {
  const canvas = document.getElementById('recCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.fillStyle = '#12121a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function toggleRecord() {
  if(isRecording) { stopRecording(true); return; }
  startRecording();
}

// ─── AUTO-TRIM SILENCE ────────────────────────────────────────────────────────
// Scans from start until RMS of a small window exceeds threshold,
// then returns a new AudioBuffer starting from that onset point.
function trimSilence(buffer, threshold = 0.015, windowSize = 256) {
  const ctx = getCtx();
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const length = buffer.length;

  // Find onset: first window where RMS > threshold
  let onsetSample = 0;
  const ch0 = buffer.getChannelData(0);
  for (let i = 0; i < length - windowSize; i += windowSize) {
    let sum = 0;
    for (let j = 0; j < windowSize; j++) sum += ch0[i + j] * ch0[i + j];
    const rms = Math.sqrt(sum / windowSize);
    if (rms > threshold) {
      // Step back one window so we don't clip the attack
      onsetSample = Math.max(0, i - windowSize);
      break;
    }
    onsetSample = i; // fallback: no onset found, keep trimming
  }

  // If basically silence throughout, return original
  if (onsetSample === 0) return buffer;

  const newLength = length - onsetSample;
  const trimmed = ctx.createBuffer(numChannels, newLength, sampleRate);
  for (let c = 0; c < numChannels; c++) {
    const srcData = buffer.getChannelData(c);
    const dstData = trimmed.getChannelData(c);
    dstData.set(srcData.subarray(onsetSample));
  }
  return trimmed;
}

async function startRecording() {
  try {
    const ctx = getCtx(); if(ctx.state==='suspended') ctx.resume();
    mediaStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
  } catch(e) {
    document.getElementById('recStatus').textContent = 'MIC-ADGANG NÆGTET';
    return;
  }

  recChunks = []; recBlob = null; recAudioBuffer = null; isRecording = true;

  // Analyser for waveform
  analyserNode = getCtx().createAnalyser();
  analyserNode.fftSize = 512;
  const source = getCtx().createMediaStreamSource(mediaStream);
  source.connect(analyserNode);

  // MediaRecorder
  const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
  mediaRecorder = new MediaRecorder(mediaStream, {mimeType});
  mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) recChunks.push(e.data); };
  mediaRecorder.onstop = async ()=>{
    recBlob = new Blob(recChunks, {type: mimeType});
    const ab = await recBlob.arrayBuffer();
    try {
      const raw = await getCtx().decodeAudioData(ab);
      recAudioBuffer = trimSilence(raw);
      document.getElementById('btnPlay').disabled = false;
      document.getElementById('btnSave').disabled = false;
      const trimmedMs = Math.round(recAudioBuffer.duration * 1000);
      document.getElementById('recStatus').textContent = 'TRIMMET TIL ' + trimmedMs + 'ms — AFSPIL ELLER GEM';
      document.getElementById('recStatus').classList.remove('live');
    } catch(e) {
      document.getElementById('recStatus').textContent = 'FEJL — PRØV IGEN';
    }
  };
  mediaRecorder.start(100);

  // UI
  document.getElementById('btnRec').classList.add('active');
  document.getElementById('btnRec').textContent = '■ STOP';
  document.getElementById('recTimer').classList.add('recording');
  document.getElementById('recStatus').textContent = '● OPTAGER...';
  document.getElementById('recStatus').classList.add('live');
  document.getElementById('btnPlay').disabled = true;
  document.getElementById('btnSave').disabled = true;
  if(navigator.vibrate) navigator.vibrate([30]);

  // Timer
  recStartTime = Date.now();
  recTimerInterval = setInterval(()=>{
    const elapsed = (Date.now()-recStartTime)/1000;
    const secs = Math.floor(elapsed);
    const frac = Math.floor((elapsed%1)*10);
    document.getElementById('recTimer').textContent = `${secs}:0${frac}`;
    if(elapsed >= MAX_REC_SECS) stopRecording(true);
  }, 50);

  drawWaveform();
}

function stopRecording(save) {
  isRecording = false;
  clearInterval(recTimerInterval);
  if(animFrame) cancelAnimationFrame(animFrame); animFrame=null;

  if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  if(mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }

  document.getElementById('btnRec').classList.remove('active');
  document.getElementById('btnRec').textContent = '● OPTAG NY';
  document.getElementById('recTimer').classList.remove('recording');

  if(!save) {
    document.getElementById('recStatus').textContent = 'ANNULLERET';
    document.getElementById('recStatus').classList.remove('live');
  }
}

function drawWaveform() {
  if(!analyserNode) return;
  const canvas = document.getElementById('recCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  const W=canvas.width, H=canvas.height;
  const data = new Uint8Array(analyserNode.frequencyBinCount);

  let xPos = 0;
  const COLORS = ['#00ff88','#ff3366','#ffcc00','#44aaff','#cc66ff','#ff8833'];
  const col = COLORS[recTrackIdx] || '#00ff88';

  let lastX=0, scroll=0;

  function draw(){
    if(!isRecording){ animFrame=null; return; }
    analyserNode.getByteTimeDomainData(data);
    // Scroll canvas
    const img = ctx.getImageData(1,0,W-1,H);
    ctx.putImageData(img,0,0);
    ctx.fillStyle='#12121a'; ctx.fillRect(W-1,0,1,H);
    // Draw new column
    const mid = H/2;
    const v = (data[data.length>>1]/128.0 - 1) * mid * 0.9;
    ctx.strokeStyle=col; ctx.lineWidth=1.5*devicePixelRatio;
    ctx.beginPath(); ctx.moveTo(W-1, mid); ctx.lineTo(W-1, mid+v); ctx.stroke();
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}

function previewSample() {
  if(!recAudioBuffer) return;
  const ctx=getCtx(); if(ctx.state==='suspended') ctx.resume();
  const src=ctx.createBufferSource();
  src.buffer=recAudioBuffer;
  src.connect(ctx.destination);
  src.start();
  if(navigator.vibrate) navigator.vibrate(10);
}

function saveSample() {
  if(!recAudioBuffer) return;
  customSamples[recTrackIdx] = recAudioBuffer;
  if(navigator.vibrate) navigator.vibrate([20,40,20]);
  document.getElementById('recStatus').textContent = '✓ GEMT PÅ ' + TRACKS[recTrackIdx].short;
  document.getElementById('recStatus').classList.remove('live');
  document.getElementById('btnSave').disabled = true;
  setTimeout(()=>{ closeRecorder(); buildUI(); }, 600);
}

let lastPatternIdx = -1;

function loadRandomPattern() {
  let idx;
  do { idx=Math.floor(Math.random()*PATTERNS.length); } while(idx===lastPatternIdx && PATTERNS.length>1);
  lastPatternIdx=idx;
  const p=PATTERNS[idx];
  barCount=2; currentBar=0;
  document.getElementById('bc1').classList.remove('active');
  document.getElementById('bc2').classList.add('active');
  for(let b=0;b<2;b++) for(let t=0;t<6;t++) for(let s=0;s<16;s++) grid[b][t][s]=!!p.bars[b][t][s];
  bpm=p.bpm; document.getElementById('bpmVal').textContent=bpm;
  const tag=document.getElementById('genreTag');
  tag.style.opacity=0; tag.textContent=p.name;
  setTimeout(()=>{ tag.style.opacity=1; },50);
  if(navigator.vibrate) navigator.vibrate([20,30,20]);
  buildUI();
}

document.getElementById('bpmUp').onclick=()=>{ bpm=Math.min(240,bpm+5); document.getElementById('bpmVal').textContent=bpm; };
document.getElementById('bpmDn').onclick=()=>{ bpm=Math.max(40,bpm-5); document.getElementById('bpmVal').textContent=bpm; };
document.getElementById('playBtn').onclick=startStop;

// ─── WIRE OVERLAY BUTTONS (touch-safe for Android) ───────────────────────────
function wireBtn(id, fn) {
  const el = document.getElementById(id);
  let fired = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); fired = true; fn(); }, {passive: false});
  el.addEventListener('click', e => { if(!fired) fn(); fired = false; });
}
wireBtn('btnRec',    toggleRecord);
wireBtn('btnPlay',   previewSample);
wireBtn('btnSave',   saveSample);
wireBtn('btnCancel', closeRecorder);
